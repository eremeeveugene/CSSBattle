<div class="panel">
  <div class="outer"></div>
  <div class="inner"></div>
</div>
<style>
  body {
    display: grid;
    place-items: center;
    background: #b0c1f0;
    margin: 0;
  }

  .panel {
    display: grid;
    place-items: center;
    position: relative;
    width: 400px;
    height: 100px;
    overflow: hidden;
  }

  .panel::after {
    content: "";
    width: 200px;
    height: 20px;
    background: #3e5aa9;
  }

  .panel * {
    display: grid;
    place-items: center;
    position: absolute;
    border: 30px solid #3e5aa9;
    transform: rotate(45deg);
  }

  .outer {
    width: 200px;
    height: 200px;
  }

  .inner {
    width: 120px;
    height: 120px;
  }
</style>
