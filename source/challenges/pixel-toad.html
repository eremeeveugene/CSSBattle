<div class="toad">
  <div class="base"></div>
  <div class="body"></div>
  <div class="eyes">
    <div class="eye">
      <div class="slera">
        <div class="pupil"></div>
      </div>
    </div>
    <div class="eye">
      <div class="slera">
        <div class="pupil"></div>
      </div>
    </div>
  </div>
</div>

  body {
    background: #eeeeee;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .toad {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .body {
    position: absolute;
    background: #246541;
    width: 100px;
    height: 160px;
  }

  .base {

  .eyes {
    position: absolute;
    display: grid;
    grid-template-columns: 1fr 1fr;
    transform: translateY(-80px);
  }

  .eye {
    background: #439e6b;
    width: 50px;
    border-radius: 50%;
    aspect-ratio: 1;
    display: grid;
    overflow: hidden;
    align-content: center;
  }

  .slera {
    background: #eeeeee;
    height: 16px;
    overflow: hidden;
    display: grid;
    justify-items: center;
  }

  .pupil {
    background: #000000;
    width: 20px;
    aspect-ratio: 1;
    border-radius: 50%;
    transform: translateY(-50%);
  }
</style>
