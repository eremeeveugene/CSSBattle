<div class="container">
  <div class="rect"></div>
  <div class="circles">
    <div class="circle"></div>
    <div class="circle"></div>
  </div>
</div>

  body {
    background: #328fc1;
    display: grid;
    place-content: center;
  }

  .container {

    place-content: center;

    overflow: hidden;

  .circles {
    display: flex;
    gap: 120px;
  }

  .circle {
    z-index: 1;
    border: 30px solid #f5d6b4;
    border-radius: 50%;
    width: 220px;
    height: 220px;
    background: #328fc1;
  }
</style>
