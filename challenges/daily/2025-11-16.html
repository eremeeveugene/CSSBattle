<div class="circle left"></div>
<div class="circle right"></div>
<div class="diamond"></div>
<style>
  body {
    background: #8cfadc;
    display: grid;
  }

  body * {
    position: absolute;
    place-self: center;
  }

  .circle {
    background: #1a4341;
    border-radius: 50%;
    width: 120px;
    height: 120px;
  }

  .left {
    transform: translate(-19px, 9px);
  }

  .right {
    transform: translate(19px, 9px);
  }

  .diamond {
    background: #8cfadc;
    transform: rotate(45deg);
    margin-bottom: 72px;
    width: 90px;
    height: 90px;
    display: grid;
  }

  .diamond::after {
    content: "";
    background: #1a4341;
    width: 50px;
    height: 50px;
    place-self: end;
    margin: 16px;
  }
</style>
