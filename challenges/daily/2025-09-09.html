<div class="grid">
  <div class="rect"></div>
  <div class="rect top-right"></div>
  <div class="rect bottom-left"></div>
  <div class="corner"></div>
</div>
<style>
  body {
    background: #142032;
    display: grid;
    place-items: center;
  }

  .grid {
    display: grid;
    grid: 50px 110px / 50px 110px;
    gap: 60px;
  }

  .rect {
    display: grid;
    place-items: center;
    border: 10px solid #00b1d4;
    width: 40px;
    height: 40px;
  }

  .rect::after {
    content: "";
    background: #00b1d4;
    width: 20px;
    height: 20px;
    position: absolute;
  }

  .bottom-left {
    align-self: end;
  }

  .top-right {
    justify-self: end;
  }

  .corner {
    border: 30px solid #00b1d4;
    border-left: none;
    border-top: none;
  }
</style>
